<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:#000;
    color:#fff;
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:56px 22px;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:#fff;color:#000}

  .wrap{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;text-align:center}

  .avatar{
    width:92px;height:92px;border-radius:50%;
    background:#0d0d0d;border:1px solid rgba(255,255,255,.16);
    display:grid;place-items:center;font-size:34px;font-weight:700;letter-spacing:-.02em;object-fit:cover;overflow:hidden;
    margin-bottom:22px;
  }
  .name{font-size:26px;font-weight:700;letter-spacing:-.02em}
  .bio{font-size:14.5px;color:#8b8b8b;margin-top:8px;font-weight:400;letter-spacing:.01em}

  .links{width:100%;display:flex;flex-direction:column;gap:13px;margin-top:38px}
  .link{
    position:relative;display:flex;align-items:center;justify-content:center;
    width:100%;padding:17px 52px;border-radius:14px;
    border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.025);
    color:#fff;font-size:15.5px;font-weight:500;
    transition:background .2s ease,color .2s ease,border-color .2s ease,transform .2s ease;
    text-decoration:none;cursor:pointer;
  }
  .link .ico{position:absolute;left:20px;top:50%;transform:translateY(-50%);display:grid;place-items:center}
  .link .ico svg{width:21px;height:21px;display:block}
  .link:hover{background:#fff;color:#000;border-color:#fff;transform:translateY(-2px)}

  .foot{margin-top:42px;font-size:11.5px;color:#5a5a5a;letter-spacing:.02em}

  /* entrance */
  @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .anim{opacity:0;animation:up .6s cubic-bezier(.22,.61,.36,1) forwards}
  .d0{animation-delay:.02s}.d1{animation-delay:.10s}.d2{animation-delay:.18s}.d3{animation-delay:.26s}.d4{animation-delay:.34s}.d5{animation-delay:.42s}.d6{animation-delay:.50s}
  @media(prefers-reduced-motion:reduce){.anim{animation:none;opacity:1}}
  @media(max-width:420px){.link{font-size:15px;padding:16px 48px}.name{font-size:23px}}
</style>
</head>
